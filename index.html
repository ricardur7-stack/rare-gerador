<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VETRIX ANDROID</title>

<!-- ÍCONE -->
<link rel="icon" href="icon.PNG">
<link rel="apple-touch-icon" href="icon.PNG">

<!-- PWA -->
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VETRIX">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0a0000, #000);
  color: white;
}

/* LOGIN */
#login {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 90%;
  max-width: 320px;
  background: #0f0f0f;
  border-radius: 14px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

.card h2 {
  color: red;
}

.card input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1a1a1a;
  color: white;
  margin-top: 10px;
}

.card button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
}

/* PAINEL */
#panel {
  display: none;
  padding: 20px;
}

.box {
  max-width: 380px;
  margin: auto;
  background: #0f0f0f;
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
}

.box h3 {
  color: red;
}

.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: linear-gradient(red, #700000);
  border: none;
  border-radius: 8px;
  color: white;
}

.slider {
  width: 100%;
}

.label {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="login">
  <div class="card">
    <h2>VETRIX</h2>
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<div id="panel">
  <div class="box">
    <h3>VETRIX ANDROID PANEL</h3>

    <p id="device"></p>

    <button class="btn" onclick="basic()">Otimização Básica</button>
    <button class="btn" onclick="pro()">Otimização Avançada</button>

    <div>
      <p class="label">FPS</p>
      <input type="range" min="30" max="120" value="60" class="slider" id="fps" oninput="fpsUpdate()">
      <p id="fpsTxt">FPS: 60</p>
    </div>

    <div>
      <p class="label">Delay</p>
      <input type="range" min="0" max="100" value="0" class="slider" id="delay" oninput="delayUpdate()">
      <p id="delayTxt">Delay: 0%</p>
    </div>

    <button class="btn" onclick="apply()">Aplicar</button>

    <button class="btn" onclick="abrirFF()">ABRIR FREE FIRE</button>
  </div>
</div>

<script>
function entrar() {
  let senha = document.getElementById("senha").value;

  if (senha === "VETRIX00") {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";

    document.getElementById("device").innerText = "Dispositivo: " + navigator.userAgent;
  } else {
    alert("Senha errada");
  }
}

function fpsUpdate() {
  document.getElementById("fpsTxt").innerText =
    "FPS: " + document.getElementById("fps").value;
}

function delayUpdate() {
  document.getElementById("delayTxt").innerText =
    "Delay: " + document.getElementById("delay").value + "%";
}

function basic() {
  let btn = event.target;
  btn.innerText = "Aplicando...";
  setTimeout(() => btn.innerText = "Básico ✓", 1500);
}

function pro() {
  let btn = event.target;
  btn.innerText = "Otimizando...";
  setTimeout(() => btn.innerText = "Avançado ✓", 2000);
}

function apply() {
  let btn = event.target;
  btn.innerText = "Aplicando...";
  setTimeout(() => btn.innerText = "Aplicado ✓", 1500);
}

function abrirFF() {
  let btn = event.target;
  btn.innerText = "Abrindo...";
  btn.disabled = true;

  let ua = navigator.userAgent.toLowerCase();

  if (ua.includes("android")) {
    window.location.href =
      "intent://#Intent;scheme=freefire;package=com.dts.freefireth;end";
  } else {
    window.location.href = "freefire://";
  }

  setTimeout(() => {
    btn.innerText = "ABRIR FREE FIRE";
    btn.disabled = false;
  }, 3000);
}
</script>

</body>
</html>
